name: Deploy to S3 and CloudFront

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      # ─── 1. Checkout code ───
      - name: Checkout
        uses: actions/checkout@v4

      # ─── 2. Setup Node.js ───
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ─── 3. Setup pnpm ───
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      # ─── 4. Install dependencies ───
      - name: Install dependencies
        run: pnpm install

      # ─── 5. Build Next.js App ───
      - name: Build Next.js App
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_REGION: ${{ secrets.S3_REGION }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPER_ADMIN_JWT_SECRET: ${{ secrets.SUPER_ADMIN_JWT_SECRET }}
          PAYLOAD_TOKEN: ${{ secrets.PAYLOAD_TOKEN }}
        run: pnpm run build

      # ─── 6. Configure AWS credentials ───
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ─── 7. Deploy to S3 ───
      - name: Deploy to S3
        run: |
          # If output is set to "export" in next.config.ts, the build output will be in "out/"
          # Otherwise it builds to ".next/"
          if [ -d "out" ]; then
            echo "Found 'out/' directory. Syncing static export to S3..."
            aws s3 sync out/ s3://$S3_BUCKET_NAME --delete
          elif [ -d ".next" ]; then
            echo "Warning: No 'out' directory found. Syncing '.next' and 'public' directories instead."
            aws s3 sync public/ s3://$S3_BUCKET_NAME/public --delete
            aws s3 sync .next/static/ s3://$S3_BUCKET_NAME/_next/static --delete
          else
            echo "Error: No build directory ('out' or '.next') found."
            exit 1
          fi

      # ─── 8. Invalidate CloudFront Cache ───
      - name: Invalidate CloudFront
        run: |
          if [ -n "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
            echo "Invalidating CloudFront distribution $CLOUDFRONT_DISTRIBUTION_ID..."
            aws cloudfront create-invalidation \
              --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
              --paths "/*"
          else
            echo "Warning: CLOUDFRONT_DISTRIBUTION_ID is not set in secrets. Skipping invalidation."
          fi
